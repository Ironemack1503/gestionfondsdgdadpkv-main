# ================================================================
# GestCaisse – Configuration Nginx Production
# Optimisé pour 100+ utilisateurs LAN, SSL auto-signé, proxy Supabase
# ================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------
    # Logs
    # ---------------------------------------------------------------
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ---------------------------------------------------------------
    # Performance réseau
    # ---------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    server_tokens       off;
    types_hash_max_size 2048;

    # ---------------------------------------------------------------
    # Buffers (100+ utilisateurs simultanés)
    # ---------------------------------------------------------------
    client_max_body_size    16m;
    client_body_buffer_size 128k;
    client_header_timeout   15s;
    client_body_timeout     30s;
    send_timeout            30s;

    # ---------------------------------------------------------------
    # Gzip – réduction bande passante LAN
    # ---------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2
        application/wasm;

    # ---------------------------------------------------------------
    # Rate limiting – sécurité anti-flood
    # ---------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api_zone:20m  rate=60r/s;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:20m;

    # ---------------------------------------------------------------
    # Paramètres proxy globaux (Supabase)
    # ---------------------------------------------------------------
    proxy_http_version      1.1;
    proxy_cache_bypass      $http_upgrade;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout   120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout   120s;
    proxy_buffering      on;
    proxy_buffers        16 16k;
    proxy_buffer_size    64k;

    # ---------------------------------------------------------------
    # Redirection HTTP → HTTPS (avec health check sur HTTP)
    # ---------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # Health check interne (Docker) – pas de redirect
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------
    # Serveur HTTPS principal
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # ---------- SSL ----------
        ssl_certificate      /etc/nginx/certs/server.crt;
        ssl_certificate_key  /etc/nginx/certs/server.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:30m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # ---------- Limite connexions par IP ----------
        limit_conn conn_zone 100;

        # ---------- En-têtes de sécurité ----------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ---------- Health check (sans logs) ----------
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---------- Proxy Supabase API (auth + REST + realtime) ----------
        # Le chemin /api/ → Supabase port 45321
        # host.docker.internal = le PC serveur vu depuis le conteneur
        location /api/ {
            limit_req zone=api_zone burst=200 nodelay;

            proxy_pass http://host.docker.internal:45321/;

            # CORS pour l'app React
            add_header Access-Control-Allow-Origin  "$http_origin"                                          always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"                always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, X-Client-Info"    always;
            add_header Access-Control-Expose-Headers "Content-Range, X-Total-Count"                         always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Rate limit renforcé pour les routes auth
        location /api/auth/ {
            limit_req zone=auth_zone burst=15 nodelay;
            proxy_pass http://host.docker.internal:45321/auth/;
        }

        # ---------- Assets statiques (JS/CSS/images – cache 1 an) ----------
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp|wasm)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---------- SPA React (toutes les routes → index.html) ----------
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # index.html jamais mis en cache (pour déploiements)
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                add_header Pragma        "no-cache";
                expires -1;
            }
        }
    }
}
